# dotfiles シンボリックリンク定義
# 形式: source:target
# source は ~/dotfiles からの相対パス
# target は絶対パス（~ はホームディレクトリ）
.gitconfig:~/.gitconfig
.gitignore_global:~/.gitignore_global
zsh/.zshrc:~/.zshrc
zsh/sheldon:~/.config/sheldon
nvim:~/.config/nvim
claude/CLAUDE.md:~/.claude/CLAUDE.md
claude/settings.json:~/.claude/settings.json
cmux/settings.json:~/.config/cmux/settings.json
cmux/config.ghostty:~/.config/ghostty/config
yazi:~/.config/yazi
gh/config.yml:~/.config/gh/config.yml
.tool-versions:~/.tool-versions
